  dry_technical_room: true
  wet_dry_separation: true
  local_smart_home_ready: true
  network_cabling: "Cat6A"
  primary_bim_format: "IFC"
  source_model_tool: "FreeCAD"
  visualisation_tool: "BlenderBIM"
